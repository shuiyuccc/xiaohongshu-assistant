<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片分析测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 30px; color: #333; }

    .settings {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .settings h3 { margin-bottom: 15px; color: #666; font-size: 14px; }
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    input:focus { outline: none; border-color: #ff6b6b; }

    .upload-area {
      background: white;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: pointer;
      border: 2px dashed #ddd;
      transition: all 0.2s;
    }
    .upload-area:hover { border-color: #ff6b6b; background: #fff5f5; }
    .upload-area.has-image { padding: 10px; }
    .upload-area img { max-width: 100%; max-height: 400px; border-radius: 8px; }
    .upload-text { color: #999; margin-top: 10px; }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #ff6b6b, #ff5252);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
    }
    button:hover { opacity: 0.9; }
    button:disabled { background: #ccc; cursor: not-allowed; }

    .result {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      white-space: pre-wrap;
      line-height: 1.6;
      color: #333;
    }
    .error { background: #fff3f3; color: #d32f2f; padding: 15px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>图片分析测试</h1>

    <div class="settings">
      <h3>API 设置</h3>
      <div class="settings-grid">
        <input type="text" id="apiKey" placeholder="API Key">
        <input type="text" id="baseUrl" placeholder="Base URL" value="https://api.deepseek.com">
        <input type="text" id="model" placeholder="模型名" value="deepseek-chat">
      </div>
    </div>

    <div class="upload-area" id="uploadArea">
      <div id="uploadText">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <div class="upload-text">点击或拖拽上传图片</div>
      </div>
      <img id="preview" style="display:none">
      <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>

    <button id="analyzeBtn" disabled>分析图片</button>

    <div id="result"></div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const uploadText = document.getElementById('uploadText');
    const preview = document.getElementById('preview');
    const fileInput = document.getElementById('fileInput');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resultDiv = document.getElementById('result');

    let imageBase64 = '';

    uploadArea.addEventListener('click', () => fileInput.click());

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '#ff6b6b';
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.style.borderColor = '#ddd';
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '#ddd';
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleFile(file);
    });

    function handleFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        imageBase64 = e.target.result.split(',')[1];
        preview.src = e.target.result;
        preview.style.display = 'block';
        uploadText.style.display = 'none';
        uploadArea.classList.add('has-image');
        analyzeBtn.disabled = false;
      };
      reader.readAsDataURL(file);
    }

    analyzeBtn.addEventListener('click', async () => {
      const apiKey = document.getElementById('apiKey').value;
      const baseUrl = document.getElementById('baseUrl').value.trim() || 'https://api.deepseek.com';
      const model = document.getElementById('model').value.trim() || 'deepseek-chat';

      if (!apiKey) {
        resultDiv.innerHTML = '<div class="error">请输入 API Key</div>';
        return;
      }

      if (!imageBase64) {
        resultDiv.innerHTML = '<div class="error">请上传图片</div>';
        return;
      }

      analyzeBtn.disabled = true;
      analyzeBtn.textContent = '分析中...';
      resultDiv.innerHTML = '';

      try {
        const response = await fetch(`${baseUrl}/chat/completions`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: model,
            messages: [{
              role: 'user',
              content: [
                {
                  type: 'image_url',
                  image_url: {
                    url: `data:image/jpeg;base64,${imageBase64}`
                  }
                },
                {
                  type: 'text',
                  text: '请分析这张图片：1. 图片内容是什么 2. 适合什么主题（婚礼/孕照） 3. 作为封面图有什么特点，为什么吸引人'
                }
              ]
            }]
          })
        });

        const data = await response.json();

        if (!response.ok) {
          resultDiv.innerHTML = `<div class="error">错误: ${JSON.stringify(data)}</div>`;
          return;
        }

        resultDiv.innerHTML = `<div class="result">${data.choices[0].message.content}</div>`;
      } catch (err) {
        resultDiv.innerHTML = `<div class="error">请求失败: ${err.message}</div>`;
      } finally {
        analyzeBtn.disabled = false;
        analyzeBtn.textContent = '分析图片';
      }
    });
  </script>
</body>
</html>
